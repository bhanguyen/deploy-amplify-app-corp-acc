version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        # ampx loads @parcel/watcher; a macOS-generated lockfile omits its Linux
        # prebuilt, so install the build host's binary (version-matched) explicitly.
        - npm install @parcel/watcher-linux-x64-glibc@$(node -p "require('@parcel/watcher/package.json').version") --no-save --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*